  <g fill="#f4f1e6">
    <rect x="212" y="608" width="150" height="204"/>
    <rect x="382" y="512" width="150" height="300"/>
    <rect x="552" y="392" width="150" height="420"/>
    <!-- final riser breaks the frame upward -->
